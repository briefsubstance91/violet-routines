name: Deploy to Railway

# Auto-deploys main to Railway on every push, hands-free.
#
# One-time setup (in GitHub → repo Settings):
#   1. Secrets and variables → Actions → New repository secret:
#        RAILWAY_TOKEN  = a Railway *project* token
#        (Railway dashboard → project → Settings → Tokens → Create token)
#   2. (Optional) Variables tab → New variable:
#        RAILWAY_SERVICE = your service name (defaults to "violet-routines")
#
# IMPORTANT: If your Railway service is ALREADY connected to this GitHub repo
# with auto-deploy on, you do NOT need this workflow — and running both would
# deploy twice. In that case either delete this file, or turn off Railway's
# native GitHub auto-deploy and rely on this instead.
#
# Until RAILWAY_TOKEN is set, this workflow safely no-ops (it won't fail builds).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        id: cfg
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN not set — skipping deploy. Add it in Settings → Secrets to enable."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Install Railway CLI
        if: steps.cfg.outputs.ready == 'true'
        run: npm install -g @railway/cli

      - name: Deploy
        if: steps.cfg.outputs.ready == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE || 'violet-routines' }}
        run: railway up --service "$RAILWAY_SERVICE" --ci
